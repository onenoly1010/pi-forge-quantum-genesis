[profile.default]
src = "src"
out = "out"
libs = ["lib"]

solc_version = "0.8.26"

optimizer = true
optimizer_runs = 200

# Safer default: prevent scripts from mutating repo state unexpectedly
fs_permissions = [
  { access = "read", path = "./" }
]

# Keep only if you are intentionally suppressing bytecode-size warnings
ignored_error_codes = [3860]

# Explicit and deterministic dependency resolution
remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "forge-std/=lib/forge-std/src/"
]

[rpc_endpoints]
mainnet = "https://ethereum.reth.rs/rpc"
optimism_sepolia = "https://sepolia.optimism.io/"
arbitrum_one_sepolia = "https://sepolia-rollup.arbitrum.io/rpc/"

[lint]
lint_on_build = false
