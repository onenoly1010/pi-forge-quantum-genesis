# ============================================================================
# RAILWAY DEPLOYMENT - CURRENTLY INACTIVE
# ============================================================================
# Status: DORMANT (as of 2025)
# Active deployment: Render (see render.yaml)
# 
# This configuration is preserved for potential future use or rollback.
# The Quantum Pi Forge is currently deployed on Render for cost optimization.
#
# To reactivate Railway:
# 1. Create new Railway project or relink existing
# 2. Configure environment variables in Railway dashboard
# 3. Run: railway up
# ============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python -m uvicorn server.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Explicitly tell Railway this is NOT a Node.js app
[build.nixpacksConfig]
ignoreNodeEngine = true
